name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.2'

      - name: Install dependencies
        run: pip install pyarmor

      - name: Package application
        run: |
          pyarmor gen *.py
          mv dist tt-digital-link-widget
          cp requirements.txt tt-digital-link-widget/
          cp etc/settings.json tt-digital-link-widget/etc/
          tar -czvf tt-digital-link-widget.tar.gz tt-digital-link-widget

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app
          path: tt-digital-link-widget.tar.gz

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        id: auth
        with:
          token_format: access_token
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_OIDC_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.2'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            europe-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tt/tt-digital-link-widget
          tags: |
            type=semver,pattern={{version}}

      - name: Pyarmor
        run: |
          pip install pyarmor
          pyarmor gen *.py
          cp requirements.txt dist/
          cp etc/settings.json dist/etc/

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./Dockerfile
          context: dist

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: packaged-app

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: tt-digital-link-widget.tar.gz
          generateReleaseNotes: true